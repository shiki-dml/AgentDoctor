name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

      - name: Check JavaScript syntax when Node is available
        run: |
          if command -v node >/dev/null 2>&1; then
            node --check docs/assets/app.js
          else
            echo "Node.js unavailable; pytest static site checks cover JS wiring."
          fi

      - name: Check whitespace
        run: git diff --check
